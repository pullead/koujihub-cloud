services:
  postgres:
    image: postgres:16-alpine
    container_name: koujihub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: koujihub
      POSTGRES_USER: koujihub
      POSTGRES_PASSWORD: koujihub
    ports:
      - "5432:5432"
    volumes:
      - koujihub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koujihub -d koujihub"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  koujihub-postgres-data:
